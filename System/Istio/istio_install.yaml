# -----------------------------------------------------------
# 1. Istio Base (CRDs และ Config พื้นฐาน)
# -----------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: 1.24.1
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # แก้ปัญหา OutOfSync ที่ชอบกวนใจเวลามีการแก้ Webhook
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/0/failurePolicy

---
# -----------------------------------------------------------
# 2. Istiod (Control Plane - สมองของ Istio)
# -----------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.24.1
    helm:
      parameters:
        # บังคับลงที่ Master Node (Cloud) เพื่อความปลอดภัยและประสิทธิภาพ
        # ใช้ label มาตรฐานของ K3s: node-role.kubernetes.io/control-plane
        - name: global.nodeSelector.node-role\.kubernetes\.io/control-plane
          value: "true"
          forceString: true # สำคัญมาก! ต้องบังคับเป็น String ไม่งั้น ArgoCD จะ error
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/failurePolicy

---
# -----------------------------------------------------------
# 3. Istio Ingress Gateway (ประตูรับแขก - ตัวแทน Traefik)
# -----------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.24.1
    helm:
      skipSchemaValidation: true
      # เปลี่ยนจาก parameters มาเป็นบล็อก values 
      values: |
        service:
          type: LoadBalancer
        nodeSelector:
          node-role.kubernetes.io/control-plane: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# -----------------------------------------------------------
# 4. Kiali Server (หน้าจอ Dashboard สำหรับส่อง Service Mesh)
# -----------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kiali.org/helm-charts
    chart: kiali-server
    targetRevision: 1.89.0 # หรือเวอร์ชันล่าสุดที่คุณต้องการ
    helm:
      values: |
        auth:
          strategy: anonymous 
        external_services:
          prometheus:
            url: "http://prometheus-server.istio-system:9090" 
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
